<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Night</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background: radial-gradient(circle at top,#1e1b4b,#020617);
color:white;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
overflow:hidden;
}

/* loading screen */

#loadingScreen{
position:fixed;
inset:0;
background:#020617;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:300;
}

.loader{
border:4px solid rgba(255,255,255,.2);
border-top:4px solid #fb7185;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
margin-top:20px;
}

@keyframes spin{
to{transform:rotate(360deg)}
}

/* curtains */

.curtain{
position:fixed;
top:0;
width:50%;
height:100%;
background:#8b0000;
z-index:200;
transition:transform 2s ease;
}

.left{left:0}
.right{right:0}

.open .left{transform:translateX(-100%)}
.open .right{transform:translateX(100%)}

/* floating hearts */

.heart{
position:absolute;
color:#fb7185;
opacity:.6;
font-size:18px;
animation:float 8s linear infinite;
z-index:0;
pointer-events:none;
}

@keyframes float{
from{transform:translateY(100vh)}
to{transform:translateY(-10vh)}
}

/* invite card */

.card{
position:relative;
z-index:10;
background:rgba(17,24,39,.92);
padding:35px 28px;
border-radius:20px;
max-width:420px;
width:90%;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,.7);
}

.title{
font-size:28px;
margin-bottom:6px;
}

.subtitle{
color:#fda4af;
margin-bottom:20px;
}

.details{
background:#1f2937;
padding:18px;
border-radius:14px;
margin-bottom:20px;
}

.details p{margin:8px 0;}

.buttons{
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
}

button{
background:#fb7185;
border:none;
padding:12px 18px;
border-radius:10px;
color:white;
font-size:14px;
cursor:pointer;
}

.noBtn{
background:#475569;
}

/* final message */

#finalMessage{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
text-align:center;
background:rgba(2,6,23,.95);
z-index:250;
}

#finalMessage h1{
font-size:34px;
color:white;
opacity:0;
animation:fadeIn 2s forwards;
}

@keyframes fadeIn{
to{opacity:1}
}

/* confetti */

.confetti{
position:fixed;
width:12px;
height:12px;
top:-10px;
z-index:260;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh) rotate(720deg);
opacity:0;
}
}

</style>
</head>

<body>

<div id="loadingScreen">
<h2>A special surprise is loading for you ❤️</h2>
<div class="loader"></div>
</div>

<div class="curtain left"></div>
<div class="curtain right"></div>

<div id="finalMessage">
<h1>
See you at 10PM my Love ❤️<br>
I'll be waiting for you 🥹
</h1>
</div>

<div class="card" id="inviteCard">

<div class="title">🎬 Movie Night</div>
<div class="subtitle">Just you, me & a cozy movie ❤️</div>

<div class="details">
<p><b>With:</b> My Beautiful Fiancé ❤️</p>
<p><b>Date:</b> Tonight</p>
<p><b>Time:</b> 10 PM</p>
<p><b>Movie:</b> Couple Friendly (Amazon Prime)</p>
<p><b>Snacks:</b> YOU 😋</p>
</div>

<p>Will you join me? 💖</p>

<div class="buttons">
<button onclick="celebrate()">Yes 💕</button>
<button onclick="celebrate()">Absolutely 😍</button>
<button class="noBtn" id="noBtn">No 🙈</button>
</div>

</div>

<script>

/* loading + curtain open */

setTimeout(()=>{
document.getElementById('loadingScreen').style.display='none';
document.body.classList.add('open');
},2500);

/* floating hearts */

for(let i=0;i<60;i++){
const heart=document.createElement('div');
heart.className='heart';
heart.innerHTML='❤';
heart.style.left=Math.random()*100+'vw';
heart.style.animationDuration=(6+Math.random()*6)+'s';
heart.style.fontSize=(14+Math.random()*18)+'px';
document.body.appendChild(heart);
}

/* running no button */

const noBtn=document.getElementById('noBtn');

noBtn.addEventListener('mouseover',()=>{
const x=Math.random()*150-75;
const y=Math.random()*150-75;
noBtn.style.transform=`translate(${x}px,${y}px)`;
});

/* celebration */

function celebrate(){

for(let i=0;i<220;i++){

const conf=document.createElement('div');
conf.className='confetti';

conf.style.left=Math.random()*100+'vw';
conf.style.background=`hsl(${Math.random()*360},80%,60%)`;

const size=6+Math.random()*8;
conf.style.width=size+'px';
conf.style.height=size+'px';

document.body.appendChild(conf);

setTimeout(()=>conf.remove(),3000);
}

setTimeout(()=>{

document.getElementById('inviteCard').style.display='none';
document.getElementById('finalMessage').style.display='flex';

},2000);

}

</script>

</body>
</html>
