<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Movie Night Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background: radial-gradient(circle at top,#1e1b4b,#020617);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  overflow:hidden;
}

/* CINEMA CURTAINS */
.curtain{
  position:fixed;
  top:0;
  width:50%;
  height:100%;
  background:linear-gradient(90deg,#7f1d1d,#dc2626);
  z-index:10;
  transition:all 2s ease;
}

.curtain.left{ left:0; }
.curtain.right{ right:0; }

.open .left{ transform:translateX(-100%); }
.open .right{ transform:translateX(100%); }

/* floating hearts */
.heart{
  position:absolute;
  color:#fb7185;
  font-size:20px;
  animation: float 6s linear infinite;
  opacity:0.6;
}

@keyframes float{
  from{transform:translateY(100vh) scale(0.5);opacity:0}
  to{transform:translateY(-10vh) scale(1.2);opacity:1}
}

.card{
  background:rgba(17,24,39,0.9);
  padding:40px;
  border-radius:22px;
  width:460px;
  text-align:center;
  backdrop-filter: blur(10px);
  box-shadow:0 20px 60px rgba(0,0,0,0.7);
  animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px)}
  to{opacity:1; transform:translateY(0)}
}

.title{
  font-size:34px;
  margin-bottom:6px;
}

.subtitle{
  color:#fda4af;
  margin-bottom:20px;
  min-height:24px;
}

.poster{
  width:100%;
  border-radius:12px;
  margin-bottom:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.details{
  background:#1f2937;
  padding:18px;
  border-radius:14px;
  margin-bottom:20px;
}

.details p{ margin:8px 0; }

.question{
  font-size:20px;
  margin-bottom:16px;
}

.buttons{
  display:flex;
  gap:12px;
  justify-content:center;
}

button{
  background:#fb7185;
  border:none;
  padding:14px 22px;
  border-radius:10px;
  color:white;
  font-size:15px;
  cursor:pointer;
  transition:0.25s;
  position:relative;
}

button:hover{
  transform:scale(1.08);
  background:#f43f5e;
}

.noBtn{
  background:#475569;
}

.footer{
  margin-top:18px;
  font-size:14px;
  color:#d1d5db;
}

.finalMessage{
  margin-top:20px;
  font-size:20px;
  color:#fda4af;
  display:none;
  animation:fadeIn 1s ease;
}

/* confetti */
.confetti{
  position:fixed;
  width:10px;
  height:10px;
  top:0;
  animation:fall 3s linear forwards;
}

@keyframes fall{
  to{
    transform:translateY(100vh) rotate(720deg);
    opacity:0;
  }
}

</style>
</head>
<body>

<div class="curtain left"></div>
<div class="curtain right"></div>

<audio id="bgMusic" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3" type="audio/mpeg">
</audio>

<script>

/* open cinema curtains */
window.onload = () => {
  setTimeout(()=>{
    document.body.classList.add('open');
  },500);
}

/* floating hearts */
for(let i=0;i<25;i++){
  const heart=document.createElement('div');
  heart.className='heart';
  heart.innerHTML='❤';
  heart.style.left=Math.random()*100+'vw';
  heart.style.animationDuration=(4+Math.random()*4)+'s';
  heart.style.fontSize=(14+Math.random()*20)+'px';
  document.body.appendChild(heart);
}
</script>

<div class="card">

<div class="title">🎬 Romantic Movie Night</div>
<div id="subtitle" class="subtitle"></div>

<img class="poster" src="https://images.unsplash.com/photo-1517602302552-471fe67acf66" alt="Movie Night">

<div class="details">
<p><strong>With:</strong> My Beautiful Fiancé ❤️</p>
<p><strong>Date:</strong> Friday Night</p>
<p><strong>Time:</strong> 9:30 PM</p>
<p><strong>Movie:</strong> Couple Friendly (Telugu)</p>
<p><strong>Snacks:</strong> Popcorn & Chocolate 🍫</p>
</div>

<div class="question">Will you join me for this special night? 💖</div>

<div class="buttons">
<button onclick="celebrate()">Yes 💕</button>
<button onclick="celebrate()">Absolutely 😍</button>
<button class="noBtn" id="noBtn">No 🙈</button>
</div>

<div class="footer">Dress code: Cozy pajamas allowed 🥰</div>

<div id="finalMessage" class="finalMessage">See you at 9:30, my love ❤️🍿</div>

</div>

<script>

/* typing animation */
const text="Just you, me & a cozy movie 🍿❤️";
let i=0;
function type(){
  if(i<text.length){
    document.getElementById("subtitle").innerHTML+=text.charAt(i);
    i++;
    setTimeout(type,50);
  }
}

type();

/* running NO button */
const noBtn=document.getElementById("noBtn");
noBtn.addEventListener("mouseover",()=>{
  const x=Math.random()*200-100;
  const y=Math.random()*200-100;
  noBtn.style.transform=`translate(${x}px,${y}px)`;
});

function celebrate(){

  const music=document.getElementById("bgMusic");
  music.play().catch(()=>{});

  for(let i=0;i<160;i++){
    const conf=document.createElement('div');
    conf.className='confetti';

    conf.style.left=Math.random()*100+'vw';
    conf.style.background=`hsl(${Math.random()*360},80%,60%)`;
    conf.style.animationDuration=(2+Math.random()*2)+'s';

    document.body.appendChild(conf);

    setTimeout(()=>{conf.remove()},3000);
  }

  document.getElementById("finalMessage").style.display="block";
}

</script>

</body>
</html>
