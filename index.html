<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Movie Night</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#000;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  overflow:hidden;
}

/* THEATER */
.theater{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:radial-gradient(circle at center,#111 0%,#000 70%);
}

.screen{
  width:70vw;
  height:70vh;
  background:#f5f5f5;
  border-radius:12px;
  box-shadow:0 0 60px rgba(255,255,255,.15);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}

/* CURTAINS */
.curtain{
  position:fixed;
  top:0;
  width:50%;
  height:100%;
  background:linear-gradient(90deg,#7f1d1d,#dc2626);
  z-index:20;
  transition:transform 2s ease;
}
.curtain.left{left:0}
.curtain.right{right:0}
.open .left{transform:translateX(-100%)}
.open .right{transform:translateX(100%)}

.card{
  background:rgba(17,24,39,.9);
  padding:40px;
  border-radius:20px;
  text-align:center;
  max-width:420px;
}

.title{font-size:32px;margin-bottom:10px}
.subtitle{color:#fda4af;margin-bottom:20px}

.details{
  background:#1f2937;
  padding:18px;
  border-radius:12px;
  margin-bottom:20px;
}
.details p{margin:8px 0}

.buttons{display:flex;gap:10px;justify-content:center}
button{
  background:#fb7185;
  border:none;
  padding:12px 20px;
  border-radius:10px;
  color:white;
  font-size:15px;
  cursor:pointer;
}
.noBtn{background:#475569}

/* MINION SCENE */
#minionScene{
  display:none;
  width:100%;
  height:100%;
  background:black;
  position:relative;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
}

.minionWalker{
  position:absolute;
  bottom:30%;
  font-size:80px;
  left:-120px;
  animation:walkAcross 4s linear forwards;
}

@keyframes walkAcross{
  from{left:-120px}
  to{left:45%}
}

.heartSign{
  font-size:40px;
  margin-top:10px;
  opacity:0;
  animation:showSign 1s ease forwards;
  animation-delay:4s;
}

@keyframes showSign{
  to{opacity:1;transform:scale(1.1)}
}

.finalMessage{
  font-size:30px;
  color:#ffd54a;
  margin-top:20px;
  opacity:0;
  animation:fadeMsg 1s ease forwards;
  animation-delay:5s;
}

@keyframes fadeMsg{
  to{opacity:1}
}

</style>
</head>
<body>

<audio id="chime">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_8b5d2b6a1c.mp3" type="audio/mpeg">
</audio>

<div class="theater">
<div class="screen" id="screen">

<div class="card" id="inviteCard">

<div class="title">🎬 Movie Night</div>
<div class="subtitle">Just you, me & a cozy movie ❤️</div>

<div class="details">
<p><strong>With:</strong> My Beautiful Fiancé ❤️</p>
<p><strong>Date:</strong> Tonight</p>
<p><strong>Time:</strong> 10 PM</p>
<p><strong>Movie:</strong> Couple Friendly (Amazon Prime)</p>
<p><strong>Snacks:</strong> YOU 😋</p>
</div>

<div style="margin-bottom:15px">Will you join me? 💖</div>

<div class="buttons">
<button onclick="startMovie()">Yes 💕</button>
<button onclick="startMovie()">Absolutely 😍</button>
<button class="noBtn" id="noBtn">No 🙈</button>
</div>

</div>

<div id="minionScene">

<div class="minionWalker">🟡👖</div>

<div class="heartSign">❤️</div>

<div class="finalMessage">
See you at 10PM my Love ♥️<br>
I'll be waiting for you 🥹
</div>

</div>

</div>
</div>

<div class="curtain left"></div>
<div class="curtain right"></div>

<script>

/* CURTAIN OPEN + CHIME */
window.onload=()=>{
 setTimeout(()=>{
  document.body.classList.add('open');
  document.getElementById('chime').play().catch(()=>{});
 },1000);
}

/* RUNNING NO BUTTON */
const noBtn=document.getElementById('noBtn');
noBtn.addEventListener('mouseover',()=>{
 const x=Math.random()*200-100;
 const y=Math.random()*200-100;
 noBtn.style.transform=`translate(${x}px,${y}px)`;
});

function startMovie(){

 noBtn.style.transform='translate(0,0)';

 const screen=document.getElementById('screen');
 const card=document.getElementById('inviteCard');
 const scene=document.getElementById('minionScene');

 card.style.display='none';

 screen.style.background='black';

 setTimeout(()=>{
  scene.style.display='flex';
 },800);

}

</script>

</body>
</html>
