<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Movie Night Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background: radial-gradient(circle at top,#1e1b4b,#020617);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  overflow:hidden;
}

/* floating hearts */
.heart{
  position:absolute;
  color:#fb7185;
  font-size:20px;
  animation: float 6s linear infinite;
  opacity:0.6;
}

@keyframes float{
  from{transform:translateY(100vh) scale(0.5);opacity:0}
  to{transform:translateY(-10vh) scale(1.2);opacity:1}
}

.card{
  background:rgba(17,24,39,0.9);
  padding:45px;
  border-radius:22px;
  width:440px;
  text-align:center;
  backdrop-filter: blur(10px);
  box-shadow:0 20px 60px rgba(0,0,0,0.7);
  animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px)}
  to{opacity:1; transform:translateY(0)}
}

.title{
  font-size:34px;
  margin-bottom:8px;
}

.subtitle{
  color:#fda4af;
  margin-bottom:25px;
}

.details{
  background:#1f2937;
  padding:22px;
  border-radius:14px;
  margin-bottom:25px;
}

.details p{
  margin:10px 0;
}

.question{
  font-size:20px;
  margin-bottom:18px;
}

.buttons{
  display:flex;
  gap:12px;
  justify-content:center;
}

button{
  background:#fb7185;
  border:none;
  padding:14px 22px;
  border-radius:10px;
  color:white;
  font-size:15px;
  cursor:pointer;
  transition:0.25s;
}

button:hover{
  transform:scale(1.08);
  background:#f43f5e;
}

.footer{
  margin-top:18px;
  font-size:14px;
  color:#d1d5db;
}

.finalMessage{
  margin-top:20px;
  font-size:20px;
  color:#fda4af;
  display:none;
}

/* confetti */
.confetti{
  position:fixed;
  width:10px;
  height:10px;
  background:red;
  top:0;
  animation:fall 3s linear forwards;
}

@keyframes fall{
  to{
    transform:translateY(100vh) rotate(720deg);
    opacity:0;
  }
}

</style>
</head>
<body>

<script>
/* floating hearts */
for(let i=0;i<20;i++){
  const heart=document.createElement('div');
  heart.className='heart';
  heart.innerHTML='❤';
  heart.style.left=Math.random()*100+'vw';
  heart.style.animationDuration=(4+Math.random()*4)+'s';
  heart.style.fontSize=(14+Math.random()*20)+'px';
  document.body.appendChild(heart);
}
</script>

<div class="card">

<div class="title">🎬 Romantic Movie Night</div>
<div class="subtitle">Just you, me & a cozy movie 🍿❤️</div>

<div class="details">
<p><strong>With:</strong> My Beautiful Fiancé ❤️</p>
<p><strong>Date:</strong> Friday Night</p>
<p><strong>Time:</strong> 9:30 PM</p>
<p><strong>Movie:</strong> Couple Friendly (Telugu)</p>
<p><strong>Snacks:</strong> Popcorn & Chocolate 🍫</p>
</div>

<div class="question">Will you join me for this special night? 💖</div>

<div class="buttons">
<button onclick="celebrate()">Yes 💕</button>
<button onclick="celebrate()">Absolutely 😍</button>
</div>

<div class="footer">Dress code: Cozy pajamas allowed 🥰</div>

<div id="finalMessage" class="finalMessage">See you at 9:30, my love ❤️🍿</div>

</div>

<script>
function celebrate(){

  for(let i=0;i<120;i++){
    const conf=document.createElement('div');
    conf.className='confetti';

    conf.style.left=Math.random()*100+'vw';
    conf.style.background=`hsl(${Math.random()*360},80%,60%)`;
    conf.style.animationDuration=(2+Math.random()*2)+'s';

    document.body.appendChild(conf);

    setTimeout(()=>{conf.remove()},3000);
  }

  document.getElementById("finalMessage").style.display="block";
}
</script>

</body>
</html>
